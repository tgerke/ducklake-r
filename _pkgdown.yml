url: https://tgerke.github.io/ducklake-r/
template:
  bootstrap: 5
  bslib:
    pkgdown-nav-height: 100px

home:
  title: "ducklake: Interact with DuckLake from R"
  description: >
    A tidyverse-friendly R interface to DuckLake, the DuckDB lakehouse
    format: versioned tables, time travel, transactions, and remote access.
  sidebar:
    structure: [links, license, community, citation, authors, dev]

navbar:
  structure:
    left:  [intro, reference, articles, news]
    right: [search, github]
  components:
    articles:
      text: Articles
      menu:
      - text: Getting Started
        href: articles/ducklake.html
      - text: -------
      - text: Use Cases
      - text: Clinical Trial Data Lake
        href: articles/clinical-trial-datalake.html
      - text: -------
      - text: Core Operations
      - text: Modifying Tables
        href: articles/modifying-tables.html
      - text: -------
      - text: Advanced Features
      - text: Data Inlining
        href: articles/data-inlining.html
      - text: Working with Transactions
        href: articles/transactions.html
      - text: Time Travel Queries
        href: articles/time-travel.html
      - text: Visualizing Your Lake
        href: articles/visualizing-your-lake.html
      - text: Storage and Backup Management
        href: articles/storage-and-backups.html
      - text: Quack Remote Access
        href: articles/quack-remote-access.html

reference:
  - title: "Setup and Connection"
    desc: "Initialize and manage DuckLake connections"
    contents:
    - install_ducklake
    - attach_ducklake
    - detach_ducklake
    - get_ducklake_connection
    - set_ducklake_connection
    - get_ducklake_backend
    - create_storage_secret

  - title: "Table Operations"
    desc: "Create and query tables"
    contents:
    - create_table
    - get_ducklake_table
    - replace_table
    - add_data_files
    
  - title: "Row Operations"
    desc: "Modify table rows with dplyr-style functions"
    contents:
    - rows_insert
    - rows_update
    - rows_delete
    
  - title: "Query Execution"
    desc: "Execute and preview SQL queries"
    contents:
    - ducklake_exec
    - show_ducklake_query
    
  - title: "Transactions"
    desc: "ACID transaction support"
    contents:
    - with_transaction
    - begin_transaction
    - commit_transaction
    - rollback_transaction
    
  - title: "Time Travel"
    desc: "Query and restore historical data"
    contents:
    - get_ducklake_table_asof
    - get_ducklake_table_version
    - get_table_changes
    - list_table_snapshots
    - plot_snapshots
    - plot_table_changes
    - restore_table_version
    
  - title: "Metadata"
    desc: "Access metadata and snapshots"
    contents:
    - get_metadata_table
    - set_snapshot_metadata
    
  - title: "Data Inlining"
    desc: "Configure and manage data inlining for streaming workloads"
    contents:
    - set_inlining_row_limit
    - get_inlining_row_limit
    - flush_inlined_data
    - checkpoint_ducklake

  - title: "Partitioning and Sorting"
    desc: "Manage partition keys and sort orders for file pruning"
    contents:
    - set_table_partitioning
    - reset_table_partitioning
    - get_table_partitions
    - set_table_sorting
    - reset_table_sorting

  - title: "Options"
    desc: "Lake, schema, and table configuration"
    contents:
    - set_ducklake_option
    - get_ducklake_options

  - title: "Backup and Maintenance"
    desc: "Backup, compaction, and storage reclamation"
    contents:
    - backup_ducklake
    - expire_snapshots
    - merge_adjacent_files
    - cleanup_old_files
    - delete_orphaned_files
    - rewrite_data_files
    - get_table_info
    - plot_table_files
    - list_ducklake_files

  - title: "Quack remote access"
    desc: "Connect to and serve DuckLake over the Quack protocol"
    contents:
    - install_quack
    - attach_quack
    - detach_quack
    - quack_query
    - quack_serve
    - quack_stop
